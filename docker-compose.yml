name: jobhunter

x-backend-env: &backend-env
  env_file: [.env]

x-backend-build: &backend-build
  build:
    context: ./backend
    dockerfile: Dockerfile

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    <<: [*backend-build, *backend-env]
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_started }

  worker-scraper:
    <<: [*backend-build, *backend-env]
    command: celery -A app.celery_app worker -Q scrape -c 2 --loglevel=info
    volumes:
      - ./backend:/app
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  worker-scoring:
    <<: [*backend-build, *backend-env]
    command: celery -A app.celery_app worker -Q scoring -c 4 --loglevel=info
    volumes:
      - ./backend:/app
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  worker-generator:
    <<: [*backend-build, *backend-env]
    command: celery -A app.celery_app worker -Q generation -c 2 --loglevel=info
    volumes:
      - ./backend:/app
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  worker-applier:
    <<: [*backend-build, *backend-env]
    command: celery -A app.celery_app worker -Q apply -c 1 --loglevel=info
    volumes:
      - ./backend:/app
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  beat:
    <<: [*backend-build, *backend-env]
    command: celery -A app.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  flower:
    <<: [*backend-build, *backend-env]
    command: celery -A app.celery_app flower --port=5555 --persistent=true
    ports:
      - "5555:5555"
    profiles: ["monitoring"]
    volumes:
      - ./backend:/app
      - flowerdata:/data
    depends_on:
      redis: { condition: service_healthy }

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    depends_on:
      - api

volumes:
  pgdata:
  miniodata:
  flowerdata:
